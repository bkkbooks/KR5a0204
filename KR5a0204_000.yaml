front:
  text: 玄帝燈儀法事如式臣聞應化無窮常處玄都之金闕本形不動巳生淨樂之王宫斂萬物而爲一身散一神而爲萬境靈通太妙道備鬱明上開混沌之玄下統虚危之宿撫成地紀實育天元持造化於四時緫權綱於一炁肅清宇宙鎭靜乾坤德並諸天功齊浩劫十極悉依於神化九霄咸頼於眞威利濟群生而利博難言功加萬有而功成不處巍巍聖德蕩蕩眞風旣竭凡才紀之莫德今某人夙欽聖化乆被眞恩羅列香燈進陳酒果通光於禁上常融之境續明於天一眞慶之宫獻此寳燈特垂洪造暫降飛雲之輦納兹行潦之觴宻俟眞光俯祈盻蠁不勝戰懼謹以奏聞稽首皈依虔誠讃詠舉聖號
  hash: sha256:6839edb6342ae1a17d9dc078ab75d3266ed6ecaa4d9373b28cd59e73bc753929
  markers:
