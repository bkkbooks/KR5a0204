front:
  text: 玄帝燈儀法事如式臣聞應化無窮常處玄都之金闕本形不動巳生淨樂之王宫斂萬物而為一身散一神而為萬境靈通太妙道備鬱明上開混沌之玄下統虛危之宿撫成地紀實育天元持造化於四時總權綱於一氣肅清宇宙鎮靜乾坤德並諸天功齊浩劫十極悉依於神化九霄咸賴於真威利濟群生而利博難言功加萬有而功成不處巍巍聖德蕩蕩真風既竭凡才紀之莫德今某人夙欽聖化久被真恩羅列香燈進陳酒果通光於禁上常融之境續明於天一真慶之宫獻此寶燈特垂洪造暫降飛雲之輦納兹行潦之觴密俟真光俯祈盻蠁不勝戰懼謹以奏聞稽首皈依虔誠讃詠舉聖號
  hash: sha256:fae64f2dfcaa60d41208795b477bccb30f5157fbc5967a709fe8fc5ca128773f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0204_HFL_000-001a, image: hfl/0083/0083-102.png}
body:
  text: 臣衆等志心歸命北極鎮天真武玄天上帝真君一切神仙諸靈官臣聞數盡曆窮有餘殃之未殄運推劫始奈舊染之猶存尚執澆漓不還淳朴六天伺隙九醜乘機始欲害於惡民因中傷於善類怨積下土毒衝上天自非大道之慈悲安得上真之濟度念爾元元之衆傷于總總之妖於是元始頒符真尊受命既匪一朝一夕之故有煩七日七夜之勤人鬼乃分重黎奠位惟神之德永劫常存今某人稱頌元功敬陳淨供仰瀆髙髙之聽俯伸翼翼之誠志心歸命北極鎮天真武玄天上帝伏願寶炬騰輝上燭玄枵之次蘭膏續焰旁通天一之宫冀仙仗之遐臨祈雲軿之下邁求祈百福殄滅千災注生籍於南宫削罪名於北府學道悟無形之妙修真獲隱景之方災障不干精邪蕩散百神守護萬事先知稽首皈依虔誠讃詠惟爾玄元衆妙之尊不言而教莫知其神渺渺億劫綿綿若存虛心實腹和光同塵鑿開造化朴散胚渾六百萬歲八十二身曲全枉直窪盈蔽新扶衰度厄起死成人其功不恃其德乃貞令宜再顯永鎮北旻上罰逆象下滅妖氛飛符走籙遊行乾坤甲庚之將贊衛爾身周環六合普護兆民魔鬼永滅道氣長存臣衆等志心歸命北極鎮天真武玄天上帝真君一切神仙諸靈官臣聞衆星拱北而知北極之尊諸數始一乃見數一為首自非全功全德豈能為首為尊仰為玄武之至真永鎮北方之大位化生十號老君本自於强名託籍諸天真武伏曰於應化神功赫赫聖烈洋洋欲頌真尊巳殫誠意今某人肅淸庭宇齊沐身心仰叩玄天輒攄丹悃志心歸命靈應佑聖真君伏願花開善瑞燼落浮災泉曲分光罷九幽之業對羅酆洞耀原七世之愆尤近逝先亡登真離苦家多孝悌世足忠良千災並散萬福咸臻稽首皈依虔誠讃詠北極玄天杳杳神君億千變化玄武靈真騰天倒地驅雷奔雲隊仗千萬掃蕩妖氛雷公電母玉女將軍鬼神降伏龍虎潜奔威鎮五嶽萬靈咸遵鳴鐘擊鼓遊行乾坤收捕逆鬼摧斬魔群除邪輔正道氣長存臣衆等志心歸命北極鎮天真武玄天上帝真君一切神仙諸靈官臣聞玉虛師相金闕化身自在於無有之鄉逍遙於聖凡之境或去為十天之主或來作百王之師故八十次顯為老君亦八十二號為玄武現相或異本體無殊含隂育陽躡龜蛇而成妙用司南居北示離坎而作乾罡道德難知功勳不紀故在地有太和之境為武可當在天有壬癸之方非玄不授無涯功德難盡讃揚今某人灑掃塵居宏陳法席顒望虛危之次馳誠北極之天俯賜霓旌少留飈馭納此蘋蘩之薦鑒兹豺獺之誠下憫丹衷伸知素愊志心歸命靈應佑聖真君伏願瑞開金羊之焰祥輝銅鴨之光下破重昏上通無極存亡受惠長幼蒙恩宅宇光輝門闌喜慶災不生而禍不作家愈富而業愈隆錫五福於身宫除六極於眷屬恩推上聖悉賴真休稽首皈依虔誠讃詠太隂化生水火之精虛危上應龜蛇合形周環六合威攝萬靈無幽不察無願不成劫終劫始剪伐妖精救護羣品家國咸寧數終末甲妖氣流行上帝有勑聖固降臨闡楊正教蕩邪辟兵化洽黎兆協贊中興敢有小鬼輒撓生靈悉皆消滅永不留停凶穢消蕩道氣長存諷經化財回向玄帝燈儀終
  hash: sha256:e1ad40c6be73934c6d214bae617d470b6e35edbca20942a4a8ef29c8ec6ffd00
