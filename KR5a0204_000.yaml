body:
  text: 臣衆等志心歸命北極鎭天眞武玄天上帝眞君一切神仙諸靈官臣聞數盡曆窮有餘殃之未殄運推劫始奈舊染之猶存尚執澆漓不還淳朴六天伺隙九醜乘機始欲害於惡民因中傷於善𩔖怨積下土毒衝上天自非大道之慈悲安得上眞之濟度念爾元元之衆傷于緫緫之妖於是元始頒符眞尊受命旣匪一朝一夕之故有煩七日七夜之勤人鬼乃分重黎奠位惟神之德永劫常存今某人稱頌元功敬陳淨供仰瀆髙髙之聽俯伸翼翼之誠志心歸命北極鎭天眞武玄天上帝伏願寳炬騰輝上燭玄枵之次蘭膏續焰旁通天一之宫冀仙仗之遐臨祈雲軿之下邁求祈百福殄滅千災注生籍於南宫削罪名於北府學道悟无形之妙修眞獲隱景之方災障不干精邪蕩散百神守護萬事先知稽首皈依虔誠讃詠惟爾玄元衆妙之尊不言而教莫知其神渺渺億劫綿綿若存虚心實腹和光同塵鑿開造化樸散胚渾六百萬歳八十二身曲全枉直窪盈蔽新扶衰度厄起死成人其功不恃其德乃貞令宜再顯永鎭北旻上罰逆象下滅妖氛飛符走籙遊行乾坤甲庚之將賛衞爾身周環六合普護兆民魔鬼永滅道炁長存臣衆等志心歸命北極鎭天眞武玄天上帝眞君一切神仙諸靈官臣聞衆星拱北而知北極之尊諸數始一乃見數一爲首自非全功全德豈能爲首爲尊仰爲玄武之至眞永鎭北方之大位化生十號老君本自於强名託籍諸天眞武伏曰於應化神功赫赫聖烈洋洋欲頌眞尊巳殫誠意今某人肅淸庭宇齋沐身心仰叩玄天輒攄丹悃志心歸命靈應佑聖眞君伏願花開善瑞燼落浮災泉曲分光罷九幽之業對羅酆洞耀原七世之愆尤近逝先亡登眞離苦家多孝悌世足忠良千災並散萬福咸臻稽首皈依虔誠讃詠北極玄天杳杳神君億千變化玄武靈眞騰天倒地驅雷奔雲隊仗千萬掃蕩妖氛雷公電母玉女將軍鬼神降伏龍虎潜奔威鎭五岳萬靈咸遵鳴鐘擊皷遊行乾坤收捕逆鬼摧斬魔群除邪輔正道炁長存臣衆等志心歸命北極鎭天眞武玄天上帝眞君一切神仙諸靈官臣聞玉虛師相金闕化身自在於無有之郷逍遥於聖凡之境或去爲十天之主或來作百王之師故八十次顯爲老君亦八十二號爲玄武現相或異本體無殊含隂育陽躡龜蛇而成妙用司南居北示離坎而作乾罡道德難知功勲不紀故在地有太和之境爲武可當在天有壬癸之方非玄不授無涯功德難盡讃揚今某人灑掃塵居宏陳法席顒望虛危之次馳誠北極之天俯賜霓旌少留飈馭納此蘋蘩之薦鑒兹豺獺之誠下憫丹衷伸知素愊志心歸命靈應佑聖眞君伏願瑞開金羊之焰祥輝銅鴨之光下破重昏上通無極存亡受惠長㓜蒙恩宅宇光輝門闌喜慶災不生而禍不作家愈富而業愈隆錫五福於身宫除六極於眷屬恩推上聖悉頼眞休稽首皈依虔誠讃詠太隂化生水火之精虚危上應龜蛇合形周環六合威攝萬靈無幽不察無願不成劫終劫始剪伐妖精救護羣品家國咸寧數終末甲妖氣流行上帝有勑聖固降臨闡楊正教蕩邪辟兵化洽黎兆恊賛中興敢有小鬼輒撓生靈悉皆消滅永不留停兇穢消蕩道炁長存諷經化財回向玄帝燈儀終
  hash: sha256:310fe66879450f44bab070f65686f7d1dc7c0fc8174c72b0d0b23e7d8658bacc
